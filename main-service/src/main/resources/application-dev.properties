# =============================================
# GymConnect – DEV profile
# Shared development environment: H2 in-memory,
# SQL logging off, no H2 console
# =============================================

db.url=jdbc:h2:mem:gymconnect-dev;DB_CLOSE_DELAY=-1
hibernate.show_sql=false

spring.h2.console.enabled=false

management.endpoint.health.show-details=when-authorized
