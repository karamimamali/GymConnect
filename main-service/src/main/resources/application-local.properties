# =============================================
# GymConnect – LOCAL profile
# Developer workstation: H2 in-memory, SQL logging on,
# H2 console available at /h2-console
# =============================================

db.url=jdbc:h2:mem:gymconnect-local;DB_CLOSE_DELAY=-1
hibernate.show_sql=true

# H2 Console (useful during local development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Verbose actuator output for local debugging
management.endpoint.health.show-details=always

# Local ActiveMQ broker (e.g. docker run -p 61616:61616 apache/activemq-classic)
spring.activemq.broker-url=tcp://localhost:61616
