# =============================================
# GymConnect – PROD profile
# Persistent file-based H2 database;
# DDL set to validate (no schema changes at runtime)
# =============================================

db.url=jdbc:h2:file:./data/gymconnect-prod;DB_CLOSE_DELAY=-1
hibernate.hbm2ddl.auto=validate
hibernate.show_sql=false

spring.h2.console.enabled=false

# Hide health details from unauthenticated callers in production
management.endpoint.health.show-details=never
# Expose only health and info in production
management.endpoints.web.exposure.include=health,info,prometheus

# Production ActiveMQ broker — location and credentials come from the environment
spring.activemq.broker-url=${ACTIVEMQ_URL:tcp://activemq-prod:61616}
spring.activemq.user=${ACTIVEMQ_USER:}
spring.activemq.password=${ACTIVEMQ_PASSWORD:}
