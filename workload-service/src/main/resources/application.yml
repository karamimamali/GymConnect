server:
  port: 8081

spring:
  application:
    name: workload-service

# Service-to-service JWT — must use the SAME secret as the main service so the
# tokens it issues can be verified here without a shared user store.
jwt:
  secret: dGhpcyBpcyBhIHNlY3VyZSBzZWNyZXQga2V5IGZvciBKV1QgdG9rZW5zITEyMzQ=

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.gymconnect.workload: DEBUG
