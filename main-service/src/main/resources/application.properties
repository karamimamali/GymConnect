# =============================================
# GymConnect – base application configuration
# =============================================

# Logical service id used for Eureka registration and discovery
spring.application.name=main-service

# Active profile (override via -Dspring.profiles.active=dev|stg|prod)
spring.profiles.active=local

# Spring Boot auto-config exclusions (custom Hibernate config is used)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# -----------------------------------------------
# Actuator
# -----------------------------------------------
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.info.env.enabled=true

# -----------------------------------------------
# Application info (shown at /actuator/info)
# -----------------------------------------------
info.app.name=GymConnect
info.app.description=Gym CRM REST API
info.app.version=1.0.0
info.app.java-version=21

# -----------------------------------------------
# Default DB / Hibernate settings (used by tests
# and as fallback when no profile is active)
# -----------------------------------------------
db.driver=org.h2.Driver
db.url=jdbc:h2:mem:gymconnect;DB_CLOSE_DELAY=-1
db.username=sa
db.password=

hibernate.dialect=org.hibernate.dialect.H2Dialect
hibernate.hbm2ddl.auto=create-drop
hibernate.show_sql=false

# -----------------------------------------------
# Security – JWT
# -----------------------------------------------
# Base64-encoded 256-bit signing key (change in production)
# NOTE: the workload-service must share this exact secret to validate service tokens.
jwt.secret=dGhpcyBpcyBhIHNlY3VyZSBzZWNyZXQga2V5IGZvciBKV1QgdG9rZW5zITEyMzQ=
jwt.expiration-ms=3600000

# -----------------------------------------------
# Service discovery (Eureka)
# -----------------------------------------------
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# -----------------------------------------------
# Messaging (ActiveMQ / JMS) — asynchronous integration with workload-service.
# Broker location is environment specific; profile files override the fallback.
# Credentials are only applied by Spring Boot when both values are non-empty
# (local brokers run anonymous), so no secrets live in this file.
# -----------------------------------------------
spring.activemq.broker-url=${ACTIVEMQ_URL:tcp://localhost:61616}
spring.activemq.user=${ACTIVEMQ_USER:}
spring.activemq.password=${ACTIVEMQ_PASSWORD:}

# Queue carrying trainer workload ADD/DELETE events (JSON payload)
app.jms.workload-queue=trainer.workload.queue
