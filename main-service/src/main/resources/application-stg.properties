# =============================================
# GymConnect – STG (staging) profile
# Persistent file-based H2 database that
# survives restarts; DDL auto set to update
# =============================================

db.url=jdbc:h2:file:./data/gymconnect-stg;DB_CLOSE_DELAY=-1
hibernate.hbm2ddl.auto=update
hibernate.show_sql=false

spring.h2.console.enabled=false

management.endpoint.health.show-details=when-authorized

# Staging ActiveMQ broker
spring.activemq.broker-url=${ACTIVEMQ_URL:tcp://activemq-stg:61616}
