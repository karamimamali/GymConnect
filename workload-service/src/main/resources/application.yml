server:
  port: 8081

spring:
  application:
    name: workload-service
  profiles:
    # Override via -Dspring.profiles.active=dev|stg|prod
    active: local
  # ActiveMQ connection — environment specific; profile sections below override
  # the fallback. Credentials are only applied when both values are non-empty.
  activemq:
    broker-url: ${ACTIVEMQ_URL:tcp://localhost:61616}
    user: ${ACTIVEMQ_USER:}
    password: ${ACTIVEMQ_PASSWORD:}
  # MongoDB — stores trainer training summaries. auto-index-creation must be on so
  # the @Id (username) and @CompoundIndex (firstName+lastName) indexes are created.
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/workload}
      auto-index-creation: true

app:
  jms:
    # Queue carrying trainer workload ADD/DELETE events (JSON payload)
    workload-queue: trainer.workload.queue
    # Application dead letter queue for messages missing required information
    workload-dlq: trainer.workload.queue.dlq
    # Concurrent consumer range (min-max) for the workload listener container;
    # raised per environment below to scale consumption horizontally
    concurrency: 1-2

# Service-to-service JWT — must use the SAME secret as the main service so the
# tokens it issues can be verified here without a shared user store.
jwt:
  secret: dGhpcyBpcyBhIHNlY3VyZSBzZWNyZXQga2V5IGZvciBKV1QgdG9rZW5zITEyMzQ=

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.gymconnect.workload: DEBUG

---
# Shared development environment
spring:
  config:
    activate:
      on-profile: dev
  activemq:
    broker-url: ${ACTIVEMQ_URL:tcp://activemq-dev:61616}
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://mongodb-dev:27017/workload}
      auto-index-creation: true

app:
  jms:
    concurrency: 2-5

---
# Staging
spring:
  config:
    activate:
      on-profile: stg
  activemq:
    broker-url: ${ACTIVEMQ_URL:tcp://activemq-stg:61616}
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://mongodb-stg:27017/workload}
      auto-index-creation: true

app:
  jms:
    concurrency: 3-8

logging:
  level:
    com.gymconnect.workload: INFO

---
# Production
spring:
  config:
    activate:
      on-profile: prod
  activemq:
    broker-url: ${ACTIVEMQ_URL:tcp://activemq-prod:61616}
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://mongodb-prod:27017/workload}
      auto-index-creation: true

app:
  jms:
    concurrency: 5-10

logging:
  level:
    com.gymconnect.workload: INFO

management:
  endpoint:
    health:
      show-details: never
